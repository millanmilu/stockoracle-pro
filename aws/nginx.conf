# ==============================================================================
# StockOracle Pro — Nginx Configuration
# Place this at: /etc/nginx/sites-available/stockoracle
# Link it: sudo ln -s /etc/nginx/sites-available/stockoracle /etc/nginx/sites-enabled/
# ==============================================================================

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.stockoracle.yourdomain.com; # Replace with your subdomain or Elastic IP (or use _ to match any)

    # Logging
    access_log /var/log/nginx/stockoracle_access.log;
    error_log /var/log/nginx/stockoracle_error.log warn;

    # Backend API requests proxying
    location / {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        
        # Headers needed to forward real client details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time responsiveness
        proxy_buffering off;
    }

    # WebSocket connections support
    location /ws/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        
        # Upgrade headers to establish web socket tunnel
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout specifications for active sockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
