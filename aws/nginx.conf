# ==============================================================================
# StockOracle Pro — Nginx Configuration
# Place this at: /etc/nginx/sites-available/stockoracle
# Link it: sudo ln -s /etc/nginx/sites-available/stockoracle /etc/nginx/sites-enabled/
# ==============================================================================

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.stockoracle.yourdomain.com; # Replace with your subdomain or Elastic IP

    # Redirect all HTTP traffic to HTTPS (Managed automatically by Certbot later)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.stockoracle.yourdomain.com; # Replace with your subdomain or Elastic IP

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # SSL configuration (Certbot will overwrite/append to these lines)
    # ssl_certificate /etc/letsencrypt/live/api.stockoracle.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.stockoracle.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Logging
    access_log /var/log/nginx/stockoracle_access.log;
    error_log /var/log/nginx/stockoracle_error.log warn;

    # Backend API requests proxying
    location / {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        
        # Headers needed to forward real client details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time responsiveness
        proxy_buffering off;
    }

    # WebSocket connections support
    location /ws/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        
        # Upgrade headers to establish web socket tunnel
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout specifications for active sockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
